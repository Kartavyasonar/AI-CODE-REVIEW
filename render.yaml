services:
  # Backend — FastAPI
  - type: web
    name: ai-code-review-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # You enter this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
    disk:
      name: memory-store
      mountPath: /opt/render/project/src/memory_db
      sizeGB: 1

  # Frontend — React static site (completely free on Render)
  - type: static
    name: ai-code-review-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
